<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>家庭代墊</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f5f5f5;
      color: #222;
    }
    .card {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      line-height: 1.6;
      font-size: 16px;
    }
    .status {
      padding: 12px;
      margin-top: 16px;
      border-radius: 8px;
      background: #f0f0f0;
      word-break: break-word;
    }
    .error { background: #ffe8e8; color: #b00020; }
    .success { background: #e8fff1; color: #0b6b35; }
  </style>
</head>
<body>
  <div class="card">
    <h1>家庭代墊</h1>
    <p id="helloText">LIFF 初始化中...</p>
    <div id="status" class="status">Loading...</div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const helloText = document.getElementById('helloText');
    const statusBox = document.getElementById('status');

    function setStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = 'status' + (type ? ' ' + type : '');
    }

    async function main() {
      try {
        const configResponse = await fetch('/api/config');
        if (!configResponse.ok) {
          throw new Error('取得 LIFF 設定失敗');
        }
        const config = await configResponse.json();
        if (!config.liffId) {
          throw new Error('LIFF_ID 尚未設定，請確認環境變數');
        }

        await liff.init({ liffId: config.liffId });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        helloText.textContent = 'Hello, ' + profile.displayName;
        setStatus('LIFF 初始化成功', 'success');
      } catch (error) {
        console.error(error);
        helloText.textContent = 'LIFF 初始化失敗';
        setStatus(error.message || '未知錯誤', 'error');
      }
    }

    main();
  </script>
</body>
</html>
